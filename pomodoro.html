<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #e85d4c;
      --primary-light: #f4a39c;
      --bg-dark: #1a1a2e;
      --bg-card: #252542;
      --text-primary: #f5f5f7;
      --text-secondary: #a0a0b8;
      --accent: #ffd166;
      --success: #06d6a0;
    }
    
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(232, 93, 76, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255, 209, 102, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .timer-container {
      position: relative;
      z-index: 1;
    }

    .tomato-ring {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--primary) var(--progress, 0%), transparent var(--progress, 0%));
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease;
    }

    .tomato-ring::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: var(--bg-card);
    }

    .tomato-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(255,255,255,0.05), transparent);
    }

    .timer-inner {
      position: relative;
      z-index: 2;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(180deg, #2d2d4a 0%, #252542 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 
        inset 0 4px 20px rgba(0,0,0,0.3),
        0 0 40px rgba(232, 93, 76, 0.1);
    }

    .mode-tabs {
      display: flex;
      gap: 8px;
      padding: 6px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .mode-tab {
      padding: 8px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: none;
      color: var(--text-secondary);
    }

    .mode-tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 15px rgba(232, 93, 76, 0.4);
    }

    .mode-tab:not(.active):hover {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
    }

    .time-display {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 56px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 2px;
      line-height: 1;
    }

    .status-text {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    .control-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-start {
      background: linear-gradient(135deg, var(--primary) 0%, #d14d3e 100%);
      color: white;
      box-shadow: 0 8px 25px rgba(232, 93, 76, 0.4);
    }

    .btn-start:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 35px rgba(232, 93, 76, 0.5);
    }

    .btn-pause {
      background: linear-gradient(135deg, #3d3d5c 0%, #2d2d4a 100%);
      color: var(--text-primary);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .btn-reset {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.05);
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-reset:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }

    .controls-row {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 32px;
    }

    .stats-card {
      background: linear-gradient(145deg, rgba(37, 37, 66, 0.8), rgba(26, 26, 46, 0.9));
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px 24px;
      backdrop-filter: blur(10px);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .tomato-icons {
      display: flex;
      gap: 6px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 200px;
    }

    .tomato-icon {
      font-size: 20px;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    @keyframes popIn {
      from {
        transform: scale(0);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .float-animation {
      animation: float 6s ease-in-out infinite;
    }

    .glass-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
    }

    input[type="number"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      width: 80px;
      text-align: center;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }

    .settings-panel {
      transition: all 0.3s ease;
    }

    .notification-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: linear-gradient(135deg, var(--primary) 0%, #d14d3e 100%);
      color: white;
      padding: 16px 32px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(232, 93, 76, 0.4);
      z-index: 100;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .notification-toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const MODES = {
      focus: { label: '专注', time: 25 * 60, color: '#e85d4c' },
      shortBreak: { label: '短休息', time: 5 * 60, color: '#06d6a0' },
      longBreak: { label: '长休息', time: 15 * 60, color: '#ffd166' }
    };

    const PomodoroApp = () => {
      const [mode, setMode] = useState('focus');
      const [timeLeft, setTimeLeft] = useState(MODES.focus.time);
      const [isRunning, setIsRunning] = useState(false);
      const [tomatoes, setTomatoes] = useState(0);
      const [showSettings, setShowSettings] = useState(false);
      const [customTimes, setCustomTimes] = useState({
        focus: 25,
        shortBreak: 5,
        longBreak: 15
      });
      const [notification, setNotification] = useState({ show: false, message: '' });
      
      const intervalRef = useRef(null);
      const audioRef = useRef(null);

      useEffect(() => {
        const progress = ((MODES[mode].time - timeLeft) / MODES[mode].time) * 100;
        document.documentElement.style.setProperty('--progress', `${progress}%`);
      }, [timeLeft, mode]);

      useEffect(() => {
        if (isRunning && timeLeft > 0) {
          intervalRef.current = setInterval(() => {
            setTimeLeft(prev => {
              if (prev <= 1) {
                handleTimerComplete();
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
        } else {
          clearInterval(intervalRef.current);
        }
        return () => clearInterval(intervalRef.current);
      }, [isRunning]);

      const handleTimerComplete = useCallback(() => {
        setIsRunning(false);
        
        if (mode === 'focus') {
          setTomatoes(prev => prev + 1);
          showNotification('🎉 专注完成！休息一下吧~');
          setMode('shortBreak');
          setTimeLeft(MODES.shortBreak.time);
        } else {
          showNotification('☕ 休息结束！开始新的专注吧~');
          setMode('focus');
          setTimeLeft(MODES.focus.time);
        }
        
        playNotificationSound();
      }, [mode]);

      const showNotification = (message) => {
        setNotification({ show: true, message });
        setTimeout(() => setNotification({ show: false, message: '' }), 4000);
      };

      const playNotificationSound = () => {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.3);
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.3);
      };

      const handleStart = () => {
        if (timeLeft === 0) {
          setTimeLeft(MODES[mode].time);
        }
        setIsRunning(true);
      };

      const handlePause = () => {
        setIsRunning(false);
      };

      const handleReset = () => {
        setIsRunning(false);
        setTimeLeft(MODES[mode].time);
      };

      const handleModeChange = (newMode) => {
        setMode(newMode);
        setIsRunning(false);
        setTimeLeft(MODES[newMode].time);
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      const getStatusText = () => {
        if (isRunning) {
          return mode === 'focus' ? '专注中...' : '休息中...';
        }
        return timeLeft === 0 ? '已完成' : '准备就绪';
      };

      const handleCustomTimeChange = (type, value) => {
        const numValue = parseInt(value) || 1;
        setCustomTimes(prev => ({ ...prev, [type]: Math.max(1, Math.min(60, numValue)) }));
      };

      const applyCustomSettings = () => {
        MODES.focus.time = customTimes.focus * 60;
        MODES.shortBreak.time = customTimes.shortBreak * 60;
        MODES.longBreak.time = customTimes.longBreak * 60;
        if (!isRunning) {
          setTimeLeft(MODES[mode].time);
        }
        setShowSettings(false);
      };

      const getProgressPercentage = () => {
        return ((MODES[mode].time - timeLeft) / MODES[mode].time) * 100;
      };

      const todayTomatoes = Math.min(tomatoes, 12);
      const todayGoal = 8;

      return (
        <div className="timer-container min-h-screen flex flex-col items-center justify-center p-6">
          <div className={`notification-toast ${notification.show ? 'show' : ''}`}>
            {notification.message}
          </div>

          <div className="glass-card p-8 w-full max-w-md">
            <div className="mode-tabs mb-8">
              {Object.entries(MODES).map(([key, { label }]) => (
                <button
                  key={key}
                  className={`mode-tab ${mode === key ? 'active' : ''}`}
                  onClick={() => handleModeChange(key)}
                >
                  {label}
                </button>
              ))}
            </div>

            <div className="flex justify-center mb-4">
              <div className="tomato-ring" style={{ '--progress': `${getProgressPercentage()}%` }}>
                <div className="timer-inner">
                  <div className={`time-display ${isRunning ? 'pulse' : ''}`}>
                    {formatTime(timeLeft)}
                  </div>
                  <div className="status-text">{getStatusText()}</div>
                </div>
              </div>
            </div>

            <div className="controls-row justify-center">
              {!isRunning ? (
                <button className="control-btn btn-start" onClick={handleStart}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                  </svg>
                </button>
              ) : (
                <button className="control-btn btn-pause" onClick={handlePause}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                  </svg>
                </button>
              )}
              
              <button className="control-btn btn-reset" onClick={handleReset}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                  <path d="M3 3v5h5"/>
                </svg>
              </button>

              <button 
                className="control-btn btn-reset" 
                onClick={() => setShowSettings(!showSettings)}
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
              </button>
            </div>

            {showSettings && (
              <div className="settings-panel mt-8 pt-6 border-t border-white/10">
                <h3 className="text-white text-lg font-medium mb-4">自定义时长（分钟）</h3>
                <div className="grid grid-cols-3 gap-4">
                  <div>
                    <label className="text-gray-400 text-sm block mb-2">专注</label>
                    <input 
                      type="number" 
                      value={customTimes.focus}
                      onChange={(e) => handleCustomTimeChange('focus', e.target.value)}
                    />
                  </div>
                  <div>
                    <label className="text-gray-400 text-sm block mb-2">短休息</label>
                    <input 
                      type="number" 
                      value={customTimes.shortBreak}
                      onChange={(e) => handleCustomTimeChange('shortBreak', e.target.value)}
                    />
                  </div>
                  <div>
                    <label className="text-gray-400 text-sm block mb-2">长休息</label>
                    <input 
                      type="number" 
                      value={customTimes.longBreak}
                      onChange={(e) => handleCustomTimeChange('longBreak', e.target.value)}
                    />
                  </div>
                </div>
                <button 
                  onClick={applyCustomSettings}
                  className="w-full mt-4 py-3 bg-[#e85d4c] text-white rounded-lg font-medium hover:bg-[#d14d3e] transition-colors"
                >
                  应用设置
                </button>
              </div>
            )}
          </div>

          <div className="stats-card mt-6 flex gap-12">
            <div className="stat-item">
              <span className="stat-value text-[#e85d4c]">{tomatoes}</span>
              <span className="stat-label">今日番茄</span>
            </div>
            <div className="stat-item">
              <span className="stat-value text-[#ffd166]">{Math.min(tomatoes, 4) * 15}</span>
              <span className="stat-label">专注分钟</span>
            </div>
            <div className="stat-item">
              <span className="stat-value text-[#06d6a0]">{Math.min(Math.floor(tomatoes / 4), 3)}</span>
              <span className="stat-label">完成轮次</span>
            </div>
          </div>

          <div className="tomato-icons mt-4">
            {Array.from({ length: Math.min(tomatoes, 12) }).map((_, i) => (
              <span 
                key={i} 
                className="tomato-icon"
                style={{ animationDelay: `${i * 0.1}s` }}
              >
                🍅
              </span>
            ))}
          </div>

          <div className="mt-8 text-gray-500 text-sm">
            提示：每4个番茄后会有一个长休息
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<PomodoroApp />);
  </script>
</body>
</html>
